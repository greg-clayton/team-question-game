<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Me Anything</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 40% 0%, #1e0a3c 0%, #0e0618 70%);
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #f0e6ff;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: #f0e6ff;
      text-align: center;
    }

    .subtitle {
      color: rgba(240,230,255,0.35);
      margin-bottom: 40px;
      font-size: 0.95rem;
      text-align: center;
      font-weight: 500;
    }

    /* Name Cards */
    .names-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 100%;
      margin-bottom: 12px;
    }

    .name-card {
      padding: 11px 18px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: 1px solid rgba(201,160,245,0.12);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s, background 0.15s;
      cursor: default;
      background: rgba(255,255,255,0.04);
      color: rgba(240,230,255,0.75);
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .name-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      pointer-events: none;
    }

    .name-card.active {
      border-color: var(--c1);
      color: #f0e6ff;
      transform: scale(1.1);
      box-shadow: 0 0 20px color-mix(in srgb, var(--c1) 45%, transparent);
    }
    .name-card.active::before { opacity: 0.15; }

    .name-card.winner {
      border-color: var(--c1);
      color: #f0e6ff;
      transform: scale(1.15);
      box-shadow: 0 0 36px color-mix(in srgb, var(--c1) 65%, transparent);
      animation: pulse-winner 0.8s ease-in-out infinite alternate;
    }
    .name-card.winner::before { opacity: 0.22; }

    @keyframes pulse-winner {
      from { transform: scale(1.13); }
      to   { transform: scale(1.19); }
    }

    .name-text { position: relative; z-index: 1; }

    /* Remove button */
    .remove-btn {
      display: none;
      position: relative;
      z-index: 2;
      background: rgba(235,87,87,0.1);
      border: 1px solid rgba(235,87,87,0.25);
      color: #eb5757;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.7rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      padding: 0;
      align-items: center;
      justify-content: center;
    }
    .remove-btn:hover { background: rgba(235,87,87,0.25); }
    .names-grid.editing .remove-btn { display: flex; }

    /* Edit bar */
    .edit-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .edit-toggle-btn {
      background: none;
      border: none;
      color: rgba(240,230,255,0.25);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.3px;
    }
    .edit-toggle-btn:hover { color: #c9a0f5; background: rgba(201,160,245,0.06); }
    .edit-toggle-btn.active { color: #c9a0f5; }

    .add-name-row {
      display: none;
      gap: 8px;
      align-items: center;
    }
    .add-name-row.visible { display: flex; }

    .add-name-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,160,245,0.18);
      border-radius: 10px;
      padding: 10px 14px;
      color: #f0e6ff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      outline: none;
      width: 160px;
      transition: border-color 0.15s;
    }
    .add-name-input::placeholder { color: rgba(240,230,255,0.22); }
    .add-name-input:focus { border-color: rgba(201,160,245,0.5); }

    .add-btn {
      background: rgba(201,160,245,0.12);
      border: 1px solid rgba(201,160,245,0.25);
      border-radius: 10px;
      padding: 10px 18px;
      color: #c9a0f5;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-btn:hover { background: rgba(201,160,245,0.2); transform: translateY(-1px); }

    /* Spin Button */
    .spin-btn {
      background: linear-gradient(135deg, #c9621e, #f4a261);
      border: none;
      border-radius: 10px;
      padding: 10px 36px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      font-weight: 400;
      color: #1a0805;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 24px rgba(201, 98, 30, 0.35);
      transition: all 0.15s;
      margin-bottom: 28px;
    }
    .spin-btn:hover:not(:disabled) {
      filter: brightness(1.1);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(201, 98, 30, 0.45);
    }
    .spin-btn:active:not(:disabled) { transform: translateY(0); }
    .spin-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Question Card */
    .question-section { width: 100%; max-width: 540px; }

    .question-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,160,245,0.12);
      border-radius: 16px;
      padding: 20px 24px;
      text-align: center;
      display: none;
      animation: fadeUp 0.3s ease forwards;
    }
    .question-card.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .winner-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(240,230,255,0.35);
      margin-bottom: 6px;
    }

    .winner-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 14px;
      color: var(--winner-c1, #c9a0f5);
    }

    .question-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(240,230,255,0.35);
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.05rem;
      font-weight: 500;
      color: #f0e6ff;
      line-height: 1.5;
    }

    /* Confetti */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 100;
    }
    .confetti-piece {
      position: absolute;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>🐱 Ask Me Anything</h1>
  <p class="subtitle">Press the button to pick someone &amp; ask them a question!</p>

  <div class="names-grid" id="namesGrid"></div>

  <div class="edit-bar">
    <button class="edit-toggle-btn" id="editToggleBtn" onclick="toggleEdit()">✏️ Edit Names</button>
    <div class="add-name-row" id="addNameRow">
      <input class="add-name-input" id="newNameInput" type="text" placeholder="Enter a name..." maxlength="20" />
      <button class="add-btn" onclick="addName()">+ Add</button>
    </div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">✨ Pick Someone!</button>

  <div class="question-section">
    <div class="question-card" id="questionCard">
      <div class="winner-label">Selected</div>
      <div class="winner-name" id="winnerName"></div>
      <div class="question-label">Your question is...</div>
      <div class="question-text" id="questionText"></div>
    </div>
  </div>

  <div class="confetti-container" id="confettiContainer"></div>

  <script>
    const DEFAULT_NAMES = ['Leah', 'Justin', 'Chris', 'Greg', 'Darsh', 'Kunal'];

    const PALETTE = [
      { c1: '#c9a0f5', c2: '#a78bfa' },
      { c1: '#f4a261', c2: '#e76f51' },
      { c1: '#6fcf97', c2: '#38f9d7' },
      { c1: '#f093fb', c2: '#f5576c' },
      { c1: '#4facfe', c2: '#00f2fe' },
      { c1: '#fda085', c2: '#f6d365' },
      { c1: '#a18cd1', c2: '#fbc2eb' },
      { c1: '#30cfd0', c2: '#667eea' },
      { c1: '#56ab2f', c2: '#a8e063' },
      { c1: '#ee0979', c2: '#ff6a00' },
    ];

    const QUESTIONS = [
      "What's a hobby you absolutely love? 🎨",
      "Do you have any pets? Tell us about them! 🐾",
      "What's your biggest goal for this year? 🎯",
      "If you could live anywhere in the world, where would it be? 🌍",
      "What's a hidden talent most people don't know you have? 🎭",
      "What's your go-to comfort food? 🍕",
      "If you could have any superpower, what would you pick? ⚡",
      "What show are you currently watching or obsessed with? 📺",
      "What's on your bucket list that you haven't done yet? 🪣",
      "Are you a morning person or a night owl? 🌅",
      "What's your favorite season and why? 🍂",
      "Coffee, tea, or neither? What's your order? ☕",
      "What's a skill you'd love to learn? 🛠️",
      "What's the best trip you've ever taken? ✈️",
      "What emoji best describes your vibe today? 😄",
      "If you could have dinner with anyone (living or not), who would it be? 🍽️",
      "What's something that always makes you laugh? 😂",
      "What's your favorite way to unwind after a long day? 🛁",
      "What's a book, podcast, or movie that changed how you think? 📚",
      "What's a fun fact about yourself most people here don't know? 🤫",
      "What's the most spontaneous thing you've ever done? 🚀",
      "What's your proudest achievement so far? 🏆",
      "If you could time travel, would you go to the past or future? ⏳",
      "What's a food you've never tried but want to? 🍜",
      "What's the last song you had stuck in your head? 🎵",
      "Would you rather explore the deep ocean or outer space? 🌊",
      "What's a TV show or movie you think everyone should watch? 🎬",
      "What's something you believed as a kid that turned out to be wrong? 🧒",
      "If you had an extra hour every day, what would you do with it? ⏰",
      "What's a small thing that genuinely makes you happy? ✨",
    ];

    let names = loadNames();
    let usedQuestions = [];
    let spinning = false;
    let editMode = false;

    function loadNames() {
      try {
        const saved = localStorage.getItem('ama-names');
        return saved ? JSON.parse(saved) : [...DEFAULT_NAMES];
      } catch { return [...DEFAULT_NAMES]; }
    }

    function saveNames() {
      localStorage.setItem('ama-names', JSON.stringify(names));
    }

    function getColor(index) {
      return PALETTE[index % PALETTE.length];
    }

    function buildGrid() {
      const grid = document.getElementById('namesGrid');
      grid.innerHTML = '';
      editMode ? grid.classList.add('editing') : grid.classList.remove('editing');

      names.forEach((name, i) => {
        const color = getColor(i);
        const card = document.createElement('div');
        card.className = 'name-card';
        card.dataset.name = name;
        card.id = `card-${name}`;
        card.style.setProperty('--c1', color.c1);
        card.style.setProperty('--c2', color.c2);
        card.innerHTML = `<span class="name-text">${name}</span><button class="remove-btn" onclick="removeName('${name}')" title="Remove ${name}">✕</button>`;
        grid.appendChild(card);
      });
    }

    function toggleEdit() {
      editMode = !editMode;
      const btn = document.getElementById('editToggleBtn');
      const addRow = document.getElementById('addNameRow');
      const spinBtn = document.getElementById('spinBtn');

      btn.textContent = editMode ? '✓ Done' : '✏️ Edit Names';
      btn.classList.toggle('active', editMode);
      addRow.classList.toggle('visible', editMode);
      spinBtn.disabled = editMode;

      if (!editMode) {
        document.getElementById('newNameInput').value = '';
        document.getElementById('questionCard').classList.remove('visible');
      }
      buildGrid();
    }

    function addName() {
      const input = document.getElementById('newNameInput');
      const name = input.value.trim();
      if (!name || names.includes(name)) { input.focus(); return; }
      names.push(name);
      saveNames();
      buildGrid();
      input.value = '';
      input.focus();
    }

    function removeName(name) {
      if (names.length <= 2) return;
      names = names.filter(n => n !== name);
      saveNames();
      buildGrid();
    }

    function getRandomQuestion() {
      if (usedQuestions.length >= QUESTIONS.length) usedQuestions = [];
      const remaining = QUESTIONS.filter((_, i) => !usedQuestions.includes(i));
      const idx = QUESTIONS.indexOf(remaining[Math.floor(Math.random() * remaining.length)]);
      usedQuestions.push(idx);
      return QUESTIONS[idx];
    }

    function clearActive() {
      names.forEach(n => {
        const c = document.getElementById(`card-${n}`);
        if (c) c.classList.remove('active', 'winner');
      });
    }

    function spin() {
      if (spinning || editMode) return;
      spinning = true;

      document.getElementById('questionCard').classList.remove('visible');
      const winner = names[Math.floor(Math.random() * names.length)];
      document.getElementById('spinBtn').disabled = true;

      const totalFrames = 38;
      let currentIdx = Math.floor(Math.random() * names.length);
      const delays = [];
      for (let i = 0; i < totalFrames; i++) {
        const t = i / totalFrames;
        const speed = t < 0.5 ? 60 - t * 80 : 20 + (t - 0.5) * 320;
        delays.push(Math.max(18, Math.round(speed)));
      }

      let elapsed = 0;
      delays.forEach((delay, i) => {
        elapsed += delay;
        setTimeout(() => {
          clearActive();
          if (i === totalFrames - 1) {
            document.getElementById(`card-${winner}`).classList.add('winner');
            setTimeout(() => showQuestion(winner), 600);
          } else {
            document.getElementById(`card-${names[currentIdx % names.length]}`).classList.add('active');
            currentIdx++;
          }
        }, elapsed);
      });
    }

    function showQuestion(winner) {
      const color = getColor(names.indexOf(winner));
      const winnerNameEl = document.getElementById('winnerName');
      const qCard = document.getElementById('questionCard');

      winnerNameEl.textContent = winner + '!';
      winnerNameEl.style.setProperty('--winner-c1', color.c1);
      winnerNameEl.style.color = color.c1;
      document.getElementById('questionText').textContent = getRandomQuestion();

      qCard.classList.remove('visible');
      void qCard.offsetWidth;
      qCard.classList.add('visible');

      launchConfetti(color.c1, color.c2);
      document.getElementById('spinBtn').disabled = false;
      spinning = false;
    }

    function launchConfetti(c1, c2) {
      const container = document.getElementById('confettiContainer');
      container.innerHTML = '';
      const colors = [c1, c2, '#f0e6ff', '#f4a261', '#c9a0f5'];
      for (let i = 0; i < 55; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = '-10px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (6 + Math.random() * 7) + 'px';
        piece.style.height = (6 + Math.random() * 7) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        piece.style.animationDelay = (Math.random() * 0.5) + 's';
        container.appendChild(piece);
      }
      setTimeout(() => container.innerHTML = '', 4000);
    }

    document.getElementById('newNameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addName();
    });

    buildGrid();
  </script>
</body>
</html>
