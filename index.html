<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Me Anything</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #f093fb, #f5576c, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 40px;
      font-size: 1rem;
      text-align: center;
    }

    /* Name Cards */
    .names-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 100%;
      margin-bottom: 12px;
    }

    .name-card {
      padding: 12px 18px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      border: 3px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
      position: relative;
      overflow: visible;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .name-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: 13px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      pointer-events: none;
    }

    .name-card.active {
      border-color: var(--c1);
      color: #fff;
      transform: scale(1.12);
      box-shadow: 0 0 30px color-mix(in srgb, var(--c1) 60%, transparent);
    }
    .name-card.active::before { opacity: 0.18; }

    .name-card.winner {
      border-color: var(--c1);
      color: #fff;
      transform: scale(1.18);
      box-shadow: 0 0 50px color-mix(in srgb, var(--c1) 80%, transparent);
      animation: pulse-winner 0.8s ease-in-out infinite alternate;
    }
    .name-card.winner::before { opacity: 0.25; }

    @keyframes pulse-winner {
      from { transform: scale(1.15); }
      to   { transform: scale(1.22); }
    }

    .name-text { position: relative; z-index: 1; }

    /* Remove button on cards */
    .remove-btn {
      display: none;
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.75rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      padding: 0;
    }
    .remove-btn:hover { background: rgba(245, 87, 108, 0.7); }

    .names-grid.editing .remove-btn { display: flex; align-items: center; justify-content: center; }

    /* Edit bar */
    .edit-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .edit-toggle-btn {
      background: none;
      border: none;
      color: #475569;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.5px;
    }
    .edit-toggle-btn:hover { color: #94a3b8; background: rgba(255,255,255,0.05); }
    .edit-toggle-btn.active { color: #f5576c; }

    .add-name-row {
      display: none;
      gap: 8px;
      align-items: center;
    }
    .add-name-row.visible { display: flex; }

    .add-name-input {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 16px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      width: 160px;
      transition: border-color 0.15s;
    }
    .add-name-input::placeholder { color: #475569; }
    .add-name-input:focus { border-color: rgba(255,255,255,0.35); }

    .add-btn {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      color: #0f172a;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: filter 0.15s, transform 0.15s;
    }
    .add-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

    /* Spin Button */
    .spin-btn {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      border: none;
      border-radius: 50px;
      padding: 18px 52px;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 8px 30px rgba(245, 87, 108, 0.5);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      margin-bottom: 40px;
    }
    .spin-btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 14px 40px rgba(245, 87, 108, 0.65);
    }
    .spin-btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }
    .spin-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Question Card */
    .question-section { width: 100%; max-width: 560px; }

    .question-card {
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 36px 32px;
      text-align: center;
      backdrop-filter: blur(10px);
      transform-origin: top center;
      animation: card-drop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      display: none;
    }
    .question-card.visible { display: block; }

    @keyframes card-drop {
      from { opacity: 0; transform: translateY(-20px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .winner-name {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 6px;
      background: linear-gradient(90deg, var(--winner-c1, #f093fb), var(--winner-c2, #f5576c));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .question-label {
      color: #64748b;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 1.4rem;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.4;
    }

    /* Confetti */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 100;
    }

    .confetti-piece {
      position: absolute;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>🎉 Ask Me Anything</h1>
  <p class="subtitle">Press the button to pick someone &amp; ask them a question!</p>

  <div class="names-grid" id="namesGrid"></div>

  <div class="edit-bar">
    <button class="edit-toggle-btn" id="editToggleBtn" onclick="toggleEdit()">✏️ Edit Names</button>
    <div class="add-name-row" id="addNameRow">
      <input class="add-name-input" id="newNameInput" type="text" placeholder="Enter a name..." maxlength="20" />
      <button class="add-btn" onclick="addName()">+ Add</button>
    </div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">✨ Pick Someone!</button>

  <div class="question-section">
    <div class="question-card" id="questionCard">
      <div class="winner-name" id="winnerName"></div>
      <div class="question-label">Your question is...</div>
      <div class="question-text" id="questionText"></div>
    </div>
  </div>

  <div class="confetti-container" id="confettiContainer"></div>

  <script>
    const DEFAULT_NAMES = ['Leah', 'Justin', 'Chris', 'Greg', 'Darsh', 'Kunal'];

    const PALETTE = [
      { c1: '#f093fb', c2: '#f5576c' },
      { c1: '#4facfe', c2: '#00f2fe' },
      { c1: '#43e97b', c2: '#38f9d7' },
      { c1: '#fda085', c2: '#f6d365' },
      { c1: '#a18cd1', c2: '#fbc2eb' },
      { c1: '#30cfd0', c2: '#667eea' },
      { c1: '#f7971e', c2: '#ffd200' },
      { c1: '#ee0979', c2: '#ff6a00' },
      { c1: '#56ab2f', c2: '#a8e063' },
      { c1: '#8e2de2', c2: '#4a00e0' },
    ];

    const QUESTIONS = [
      "What's a hobby you absolutely love? 🎨",
      "Do you have any pets? Tell us about them! 🐾",
      "What's your biggest goal for this year? 🎯",
      "If you could live anywhere in the world, where would it be? 🌍",
      "What's a hidden talent most people don't know you have? 🎭",
      "What's your go-to comfort food? 🍕",
      "If you could have any superpower, what would you pick? ⚡",
      "What show are you currently watching or obsessed with? 📺",
      "What's on your bucket list that you haven't done yet? 🪣",
      "Are you a morning person or a night owl? 🌅",
      "What's your favorite season and why? 🍂",
      "Coffee, tea, or neither? What's your order? ☕",
      "What's a skill you'd love to learn? 🛠️",
      "What's the best trip you've ever taken? ✈️",
      "What emoji best describes your vibe today? 😄",
      "If you could have dinner with anyone (living or not), who would it be? 🍽️",
      "What's something that always makes you laugh? 😂",
      "What's your favorite way to unwind after a long day? 🛁",
      "What's a book, podcast, or movie that changed how you think? 📚",
      "What's a fun fact about yourself most people here don't know? 🤫",
      "What's the most spontaneous thing you've ever done? 🚀",
      "What's your proudest achievement so far? 🏆",
      "If you could time travel, would you go to the past or future? ⏳",
      "What's a food you've never tried but want to? 🍜",
      "What's the last song you had stuck in your head? 🎵",
      "Would you rather explore the deep ocean or outer space? 🌊",
      "What's a TV show or movie you think everyone should watch? 🎬",
      "What's something you believed as a kid that turned out to be wrong? 🧒",
      "If you had an extra hour every day, what would you do with it? ⏰",
      "What's a small thing that genuinely makes you happy? ✨",
    ];

    let names = loadNames();
    let usedQuestions = [];
    let spinning = false;
    let editMode = false;

    function loadNames() {
      try {
        const saved = localStorage.getItem('ama-names');
        return saved ? JSON.parse(saved) : [...DEFAULT_NAMES];
      } catch {
        return [...DEFAULT_NAMES];
      }
    }

    function saveNames() {
      localStorage.setItem('ama-names', JSON.stringify(names));
    }

    function getColor(index) {
      return PALETTE[index % PALETTE.length];
    }

    function buildGrid() {
      const grid = document.getElementById('namesGrid');
      grid.innerHTML = '';
      if (editMode) grid.classList.add('editing');
      else grid.classList.remove('editing');

      names.forEach((name, i) => {
        const color = getColor(i);
        const card = document.createElement('div');
        card.className = 'name-card';
        card.dataset.name = name;
        card.id = `card-${name}`;
        card.style.setProperty('--c1', color.c1);
        card.style.setProperty('--c2', color.c2);
        card.innerHTML = `<span class="name-text">${name}</span><button class="remove-btn" onclick="removeName('${name}')" title="Remove ${name}">✕</button>`;
        grid.appendChild(card);
      });
    }

    function toggleEdit() {
      editMode = !editMode;
      const btn = document.getElementById('editToggleBtn');
      const addRow = document.getElementById('addNameRow');
      const spinBtn = document.getElementById('spinBtn');

      btn.textContent = editMode ? '✓ Done' : '✏️ Edit Names';
      btn.classList.toggle('active', editMode);
      addRow.classList.toggle('visible', editMode);
      spinBtn.disabled = editMode;

      if (!editMode) {
        document.getElementById('newNameInput').value = '';
        document.getElementById('questionCard').classList.remove('visible');
      }

      buildGrid();
    }

    function addName() {
      const input = document.getElementById('newNameInput');
      const name = input.value.trim();
      if (!name || names.includes(name)) {
        input.focus();
        return;
      }
      names.push(name);
      saveNames();
      buildGrid();
      input.value = '';
      input.focus();
    }

    function removeName(name) {
      if (names.length <= 2) return; // keep at least 2
      names = names.filter(n => n !== name);
      saveNames();
      buildGrid();
    }

    function getRandomQuestion() {
      if (usedQuestions.length >= QUESTIONS.length) usedQuestions = [];
      const remaining = QUESTIONS.filter((_, i) => !usedQuestions.includes(i));
      const idx = QUESTIONS.indexOf(remaining[Math.floor(Math.random() * remaining.length)]);
      usedQuestions.push(idx);
      return QUESTIONS[idx];
    }

    function clearActive() {
      names.forEach(n => {
        const c = document.getElementById(`card-${n}`);
        if (c) c.classList.remove('active', 'winner');
      });
    }

    function spin() {
      if (spinning || editMode) return;
      spinning = true;

      document.getElementById('questionCard').classList.remove('visible');

      const winner = names[Math.floor(Math.random() * names.length)];
      document.getElementById('spinBtn').disabled = true;

      const totalFrames = 38;
      let currentIdx = Math.floor(Math.random() * names.length);

      const delays = [];
      for (let i = 0; i < totalFrames; i++) {
        const t = i / totalFrames;
        const speed = t < 0.5
          ? 60 - t * 80
          : 20 + (t - 0.5) * 320;
        delays.push(Math.max(18, Math.round(speed)));
      }

      let elapsed = 0;
      delays.forEach((delay, i) => {
        elapsed += delay;
        setTimeout(() => {
          clearActive();
          if (i === totalFrames - 1) {
            document.getElementById(`card-${winner}`).classList.add('winner');
            setTimeout(() => showQuestion(winner), 600);
          } else {
            document.getElementById(`card-${names[currentIdx % names.length]}`).classList.add('active');
            currentIdx++;
          }
        }, elapsed);
      });
    }

    function showQuestion(winner) {
      const winnerIndex = names.indexOf(winner);
      const color = getColor(winnerIndex);
      const qCard = document.getElementById('questionCard');
      const winnerNameEl = document.getElementById('winnerName');

      winnerNameEl.textContent = winner + '!';
      winnerNameEl.style.setProperty('--winner-c1', color.c1);
      winnerNameEl.style.setProperty('--winner-c2', color.c2);
      document.getElementById('questionText').textContent = getRandomQuestion();

      qCard.classList.remove('visible');
      void qCard.offsetWidth;
      qCard.classList.add('visible');

      launchConfetti(color.c1, color.c2);
      document.getElementById('spinBtn').disabled = false;
      spinning = false;
    }

    function launchConfetti(c1, c2) {
      const container = document.getElementById('confettiContainer');
      container.innerHTML = '';
      const colors = [c1, c2, '#ffffff', '#ffd700', '#ff6b9d'];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = '-10px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        piece.style.animationDelay = (Math.random() * 0.5) + 's';
        container.appendChild(piece);
      }
      setTimeout(() => container.innerHTML = '', 4000);
    }

    // Enter to add name
    document.getElementById('newNameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addName();
    });

    buildGrid();
  </script>
</body>
</html>
