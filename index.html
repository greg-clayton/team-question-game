<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get To Know You!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #f093fb, #f5576c, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 40px;
      font-size: 1rem;
      text-align: center;
    }

    /* Name Cards Grid */
    .names-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
      max-width: 600px;
    }

    .name-card {
      padding: 14px 22px;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      border: 3px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
      position: relative;
      overflow: hidden;
    }

    .name-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: 13px;
    }

    .name-card[data-name="Leah"]   { --c1: #f093fb; --c2: #f5576c; }
    .name-card[data-name="Justin"] { --c1: #4facfe; --c2: #00f2fe; }
    .name-card[data-name="Chris"]  { --c1: #43e97b; --c2: #38f9d7; }
    .name-card[data-name="Greg"]   { --c1: #fda085; --c2: #f6d365; }
    .name-card[data-name="Darsh"]  { --c1: #a18cd1; --c2: #fbc2eb; }
    .name-card[data-name="Kunal"]  { --c1: #30cfd0; --c2: #667eea; }

    .name-card::before {
      background: linear-gradient(135deg, var(--c1), var(--c2));
    }

    .name-card.active {
      border-color: var(--c1);
      color: #fff;
      transform: scale(1.12);
      box-shadow: 0 0 30px color-mix(in srgb, var(--c1) 60%, transparent);
    }

    .name-card.active::before { opacity: 0.18; }

    .name-card.winner {
      border-color: var(--c1);
      color: #fff;
      transform: scale(1.18);
      box-shadow: 0 0 50px color-mix(in srgb, var(--c1) 80%, transparent);
      animation: pulse-winner 0.8s ease-in-out infinite alternate;
    }

    .name-card.winner::before { opacity: 0.25; }

    @keyframes pulse-winner {
      from { transform: scale(1.15); }
      to   { transform: scale(1.22); }
    }

    .name-text { position: relative; z-index: 1; }

    /* Spin Button */
    .spin-btn {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      border: none;
      border-radius: 50px;
      padding: 18px 52px;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 8px 30px rgba(245, 87, 108, 0.5);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      margin-bottom: 40px;
    }

    .spin-btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 14px 40px rgba(245, 87, 108, 0.65);
    }

    .spin-btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }

    .spin-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* Question Card */
    .question-section {
      width: 100%;
      max-width: 560px;
      perspective: 1000px;
    }

    .question-card {
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 36px 32px;
      text-align: center;
      backdrop-filter: blur(10px);
      transform-origin: top center;
      animation: card-drop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      display: none;
    }

    .question-card.visible { display: block; }

    @keyframes card-drop {
      from { opacity: 0; transform: translateY(-20px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .winner-name {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 6px;
      background: linear-gradient(90deg, var(--winner-c1, #f093fb), var(--winner-c2, #f5576c));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .question-label {
      color: #64748b;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 1.4rem;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.4;
      margin-bottom: 28px;
    }

    .card-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .action-btn {
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 10px 26px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: #fff;
    }

    .action-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-1px);
    }

    .action-btn.primary {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      border-color: transparent;
      color: #0f172a;
    }

    .action-btn.primary:hover {
      filter: brightness(1.1);
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    /* Confetti burst on winner */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 100;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>🎉 Who's Up?</h1>
  <p class="subtitle">Press the button to pick someone &amp; ask them a question!</p>

  <div class="names-grid" id="namesGrid"></div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">✨ Pick Someone!</button>

  <div class="question-section">
    <div class="question-card" id="questionCard">
      <div class="winner-name" id="winnerName"></div>
      <div class="question-label">Your question is...</div>
      <div class="question-text" id="questionText"></div>
      <div class="card-actions">
        <button class="action-btn primary" onclick="newQuestion()">🔄 New Question</button>
        <button class="action-btn" onclick="resetGame()">🎲 Pick Again</button>
      </div>
    </div>
  </div>

  <div class="confetti-container" id="confettiContainer"></div>

  <script>
    const NAMES = ['Leah', 'Justin', 'Chris', 'Greg', 'Darsh', 'Kunal'];

    const COLORS = {
      Leah:   { c1: '#f093fb', c2: '#f5576c' },
      Justin: { c1: '#4facfe', c2: '#00f2fe' },
      Chris:  { c1: '#43e97b', c2: '#38f9d7' },
      Greg:   { c1: '#fda085', c2: '#f6d365' },
      Darsh:  { c1: '#a18cd1', c2: '#fbc2eb' },
      Kunal:  { c1: '#30cfd0', c2: '#667eea' },
    };

    const QUESTIONS = [
      "What's a hobby you absolutely love? 🎨",
      "Do you have any pets? Tell us about them! 🐾",
      "What's your biggest goal for this year? 🎯",
      "If you could live anywhere in the world, where would it be? 🌍",
      "What's a hidden talent most people don't know you have? 🎭",
      "What's your go-to comfort food? 🍕",
      "If you could have any superpower, what would you pick? ⚡",
      "What show are you currently watching or obsessed with? 📺",
      "What's on your bucket list that you haven't done yet? 🪣",
      "Are you a morning person or a night owl? 🌅",
      "What's your favorite season and why? 🍂",
      "Coffee, tea, or neither? What's your order? ☕",
      "What's a skill you'd love to learn? 🛠️",
      "What's the best trip you've ever taken? ✈️",
      "What emoji best describes your vibe today? 😄",
      "If you could have dinner with anyone (living or not), who would it be? 🍽️",
      "What's something that always makes you laugh? 😂",
      "What's your favorite way to unwind after a long day? 🛁",
      "What's a book, podcast, or movie that changed how you think? 📚",
      "What's a fun fact about yourself most people here don't know? 🤫",
      "What's the most spontaneous thing you've ever done? 🚀",
      "What's your proudest achievement so far? 🏆",
      "If you could time travel, would you go to the past or future? ⏳",
      "What's a food you've never tried but want to? 🍜",
      "What's the last song you had stuck in your head? 🎵",
      "Would you rather explore the deep ocean or outer space? 🌊",
      "What's a TV show or movie you think everyone should watch? 🎬",
      "What's something you believed as a kid that turned out to be wrong? 🧒",
      "If you had an extra hour every day, what would you do with it? ⏰",
      "What's a small thing that genuinely makes you happy? ✨",
    ];

    let usedQuestions = [];
    let spinning = false;
    let currentWinner = null;

    // Build name cards
    const grid = document.getElementById('namesGrid');
    NAMES.forEach(name => {
      const card = document.createElement('div');
      card.className = 'name-card';
      card.dataset.name = name;
      card.id = `card-${name}`;
      card.innerHTML = `<span class="name-text">${name}</span>`;
      grid.appendChild(card);
    });

    function getRandomQuestion() {
      if (usedQuestions.length >= QUESTIONS.length) usedQuestions = [];
      const remaining = QUESTIONS.filter((_, i) => !usedQuestions.includes(i));
      const idx = QUESTIONS.indexOf(remaining[Math.floor(Math.random() * remaining.length)]);
      usedQuestions.push(idx);
      return QUESTIONS[idx];
    }

    function clearActive() {
      NAMES.forEach(n => {
        const c = document.getElementById(`card-${n}`);
        c.classList.remove('active', 'winner');
      });
    }

    function spin() {
      if (spinning) return;
      spinning = true;

      // Hide question card
      const qCard = document.getElementById('questionCard');
      qCard.classList.remove('visible');

      // Pick winner
      const winner = NAMES[Math.floor(Math.random() * NAMES.length)];
      currentWinner = winner;
      document.getElementById('spinBtn').disabled = true;

      // Spin animation: cycle through names, speed up then slow down
      const totalFrames = 38;
      let frame = 0;
      let currentIdx = Math.floor(Math.random() * NAMES.length);

      const delays = [];
      for (let i = 0; i < totalFrames; i++) {
        // Ease in then ease out timing
        const t = i / totalFrames;
        const speed = t < 0.5
          ? 60 - t * 80          // speed up: 60ms → 20ms
          : 20 + (t - 0.5) * 320; // slow down: 20ms → 180ms
        delays.push(Math.max(18, Math.round(speed)));
      }

      let elapsed = 0;
      delays.forEach((delay, i) => {
        elapsed += delay;
        setTimeout(() => {
          clearActive();
          // On last frame, land on winner
          if (i === totalFrames - 1) {
            document.getElementById(`card-${winner}`).classList.add('winner');
            setTimeout(() => showQuestion(winner), 600);
          } else {
            document.getElementById(`card-${NAMES[currentIdx % NAMES.length]}`).classList.add('active');
            currentIdx++;
          }
        }, elapsed);
      });
    }

    function showQuestion(winner) {
      const colors = COLORS[winner];
      const qCard = document.getElementById('questionCard');
      const winnerNameEl = document.getElementById('winnerName');
      const questionTextEl = document.getElementById('questionText');

      winnerNameEl.textContent = winner + '!';
      winnerNameEl.style.setProperty('--winner-c1', colors.c1);
      winnerNameEl.style.setProperty('--winner-c2', colors.c2);
      questionTextEl.textContent = getRandomQuestion();

      qCard.classList.remove('visible');
      void qCard.offsetWidth; // force reflow for animation replay
      qCard.classList.add('visible');

      launchConfetti(colors.c1, colors.c2);
      document.getElementById('spinBtn').disabled = false;
      spinning = false;
    }

    function newQuestion() {
      const qCard = document.getElementById('questionCard');
      document.getElementById('questionText').textContent = getRandomQuestion();
      qCard.classList.remove('visible');
      void qCard.offsetWidth;
      qCard.classList.add('visible');
    }

    function resetGame() {
      clearActive();
      document.getElementById('questionCard').classList.remove('visible');
      currentWinner = null;
    }

    function launchConfetti(c1, c2) {
      const container = document.getElementById('confettiContainer');
      container.innerHTML = '';
      const colors = [c1, c2, '#ffffff', '#ffd700', '#ff6b9d'];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = '-10px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        piece.style.animationDelay = (Math.random() * 0.5) + 's';
        container.appendChild(piece);
      }
      setTimeout(() => container.innerHTML = '', 4000);
    }
  </script>
</body>
</html>
